# NOTE: This workflow file is NOT executed by GitHub Actions.
# GitHub Actions only reads .github/workflows/ at the repository ROOT.
# The active workflow is at: /ML project/.github/workflows/deploy-eb.yml
#
# This file is kept here as documentation / reference only.
# If this project is ever moved to its own repo, this file
# would need to be moved to .github/workflows/ at that root.

name: Deploy to AWS Elastic Beanstalk (Reference - Not Active)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ALL THREE credentials required for AWS Academy STS tokens
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".vscode/*" \
            -x "venv/*" \
            -x "__pycache__/*" \
            -x ".ipynb_checkpoints/*" \
            -x "*.pyc" \
            -x ".DS_Store" \
            -x "*.ipynb" \
            -x ".elasticbeanstalk/*" \
            -x "house-price-prediction-*.zip"

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.0
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          application-name: "House prediction"
          environment-name: "Houseprediction-env"
          version-label: house-price-${{ github.run_number }}
          deployment-package-path: deploy.zip
