name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      APP_NAME: ${{ secrets.EB_APPLICATION_NAME }}
      ENV_NAME: ${{ secrets.EB_ENVIRONMENT_NAME }}
      S3_BUCKET: ${{ secrets.EB_S3_BUCKET }}
      VERSION_LABEL: house-price-${{ github.run_number }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip
          pip install awscli zip

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      - name: Build Deployment Package
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
               ".github/*" \
               ".elasticbeanstalk/*" \
               ".vscode/*" \
               "venv/*" \
               "__pycache__/*" \
               ".ipynb_checkpoints/*" \
               "*.pyc" \
               "*.DS_Store" \
               "House_Price_Prediction.ipynb"

      - name: Upload ZIP to S3
        run: |
          aws s3 cp deploy.zip s3://${{ env.S3_BUCKET }}/${{ env.VERSION_LABEL }}.zip

      - name: Create Application Version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.APP_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=${{ env.VERSION_LABEL }}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ env.ENV_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}"

      - name: Wait for Deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names "${{ env.ENV_NAME }}"

      - name: Show Environment Status
        run: |
          aws elasticbeanstalk describe-environments \
            --environment-names "${{ env.ENV_NAME }}"
