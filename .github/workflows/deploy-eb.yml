name: Deploy to AWS Elastic Beanstalk

# ============================================================
# AWS Academy Learner Lab — IMPORTANT:
# Temporary credentials expire every ~4 hours.
# Before EVERY push, refresh all 4 GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   AWS_SESSION_TOKEN, AWS_REGION
# ============================================================

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Allows manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      APP_NAME: BeijingHousePrice
      ENV_NAME: Houseprediction-env
      S3_BUCKET: elasticbeanstalk-us-east-1-325053821714
      VERSION_LABEL: house-price-${{ github.run_number }}

    steps:
      # ----------------------------------------------------------
      # 1. Check out the repository
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # 2. Configure AWS credentials
      #    ALL THREE fields required for AWS Academy STS tokens
      # ----------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ----------------------------------------------------------
      # 3. Verify credentials — fails fast if expired
      # ----------------------------------------------------------
      - name: Verify AWS credentials
        run: |
          echo "Verifying AWS credentials..."
          aws sts get-caller-identity
          echo "Credentials are valid"

      # ----------------------------------------------------------
      # 4. Build the deployment ZIP from the app subdirectory
      #    so app.py, Procfile, requirements.txt etc are at ZIP root
      # ----------------------------------------------------------
      - name: Build deployment package
        run: |
          cd BeijingHousePricePrediction
          zip -r ../deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".elasticbeanstalk/*" \
            -x ".vscode/*" \
            -x "venv/*" \
            -x "__pycache__/*" \
            -x ".ipynb_checkpoints/*" \
            -x "*.pyc" \
            -x ".DS_Store" \
            -x "*.ipynb" \
            -x "house-price-prediction-*.zip"
          cd ..
          echo "--- Deployment package size ---"
          ls -lh deploy.zip
          echo "--- ZIP contents (top level) ---"
          unzip -l deploy.zip | head -40

      # ----------------------------------------------------------
      # 5. Upload ZIP to your S3 bucket
      # ----------------------------------------------------------
      - name: Upload ZIP to S3
        run: |
          aws s3 cp deploy.zip s3://${{ env.S3_BUCKET }}/${{ env.VERSION_LABEL }}.zip

      # ----------------------------------------------------------
      # 6. Register new application version in Elastic Beanstalk
      # ----------------------------------------------------------
      - name: Create application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ env.APP_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}" \
            --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=${{ env.VERSION_LABEL }}.zip

      # ----------------------------------------------------------
      # 7. Trigger deployment to the environment
      # ----------------------------------------------------------
      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name "${{ env.ENV_NAME }}" \
            --version-label "${{ env.VERSION_LABEL }}"

      # ----------------------------------------------------------
      # 8. Wait until deployment is fully complete
      # ----------------------------------------------------------
      - name: Wait for deployment to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names "${{ env.ENV_NAME }}"

      # ----------------------------------------------------------
      # 9. Print final environment health status
      # ----------------------------------------------------------
      - name: Show environment status
        run: |
          aws elasticbeanstalk describe-environments \
            --environment-names "${{ env.ENV_NAME }}"
